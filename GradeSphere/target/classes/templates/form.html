<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>GradeSphere - Student Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary mb-4">
    <div class="container-fluid">
        <span class="navbar-brand fw-semibold">GradeSphere</span>
        <a th:href="@{/students}" class="btn btn-outline-light btn-sm">Back to List</a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card text-bg-dark border-secondary">
                <div class="card-body">
                    <h4 class="card-title mb-3"
                        th:text="${student.id} == null ? 'Add Student' : 'Edit Student'"></h4>

                    <form th:action="@{/students}" th:object="${student}" method="post">
                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" th:field="*{name}" class="form-control" required minlength="2"/>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Math</label>
                                <input type="number" th:field="*{mathMarks}" class="form-control"
                                       min="0" max="100" required/>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Science</label>
                                <input type="number" th:field="*{scienceMarks}" class="form-control"
                                       min="0" max="100" required/>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">English</label>
                                <input type="number" th:field="*{englishMarks}" class="form-control"
                                       min="0" max="100" required/>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/students}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
