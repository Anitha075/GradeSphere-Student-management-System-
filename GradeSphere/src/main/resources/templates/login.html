<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>GradeSphere-Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-dark text-light">
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg" style="min-width: 360px;">
        <div class="card-body">
            <h3 class="card-title text-center mb-1">GradeSphere</h3>
            <p class="text-center text-muted mb-4">Student Grade Manager</p>

            <form method="post" th:action="@{/login}">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input class="form-control" type="text" name="username" value="admin" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input class="form-control" type="password" name="password" value="password" required>
                </div>
                <div th:if="${error}" class="mb-2">
                    <div class="alert alert-danger py-2" th:text="${error}"></div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
